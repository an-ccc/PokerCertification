<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州實體荷官(Dealer)專業認證</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-50 font-sans selection:bg-emerald-500/30 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-5xl mx-auto">
        <!-- 內容由 JavaScript 動態渲染 -->
    </div>

    <script>
        // ==========================================
        // 題庫生成引擎 (產生精確的 200 題專業題庫)
        // ==========================================
        const generateQuestionBank = () => {
            let qList = [];
            let idCounter = 1;

            // 1. 建立 34 個獨立的 TDA 規則核心情境 (Templates)
            const baseRuleTemplates = [
                { cat: '發牌與規則', q: '在發首發底牌時，荷官不小心將{pos}的第一張牌翻開了（Exposed card）。接下來該如何處理？', opts: ['繼續發牌，該張牌做為第一張銷牌', '宣告誤發（Misdeal），收回所有牌重新洗牌發牌', '繼續發牌，這局結束後再換牌', '視為死牌，該玩家本局無法參與'], ans: 1, exp: '根據TDA標準規則，如果發出的第一張或第二張牌被翻開，必須宣告誤發（Misdeal），所有牌收回重新洗牌。' },
                { cat: '發牌與規則', q: '發牌時，若{pos}的底牌不小心被翻開（非首兩張）怎麼處理？', opts: ['宣告誤發 (Misdeal)，全部重洗', '該玩家強制棄牌', '該牌將成為翻牌圈 (Flop) 的第一張銷牌，並補發一張原來的銷牌給該玩家', '直接換一張牌給他，被翻開的牌洗回牌堆'], ans: 2, exp: '非首兩張的底牌若被翻開，不視為誤發。荷官應繼續完成發牌，最後將原本的銷牌發給該玩家，被翻開的牌作為銷牌。' },
                { cat: '分池規則', q: '平分底池時，出現一枚無法平分的最小面額畸零籌碼 (Odd chip)。這枚籌碼應該發給誰？', opts: ['按鈕位 (Button) 玩家', '按鈕位左手邊第一個參與分池的玩家 (小盲方向)', '按鈕位右手邊第一個參與分池的玩家', '留在底池作為下一局的獎金'], ans: 1, exp: '無法平分的畸零籌碼，必須發給參與分池且位置最靠前（即按鈕位左側順時針第一位）的玩家。' },
                { cat: '攤牌規則', q: '攤牌時，若河牌圈 (River) 無人下注（大家都過牌），該由誰先亮牌？', opts: ['按鈕位玩家', '由按鈕位左手邊第一位還在局內的玩家先亮', '籌碼最多的玩家', '最後一輪有加註的玩家'], ans: 1, exp: '若最後一輪無人下注，亮牌順序由按鈕位左側第一位玩家開始順時針亮牌。' },
                { cat: '攤牌規則', q: '攤牌時，若河牌圈 (River) {pos}有下注並被跟注，該由誰先亮牌？', opts: ['最後一個採取激進動作（下注或加註）的玩家先亮牌', '跟注的玩家先亮牌', '按鈕位玩家', '籌碼最少的玩家'], ans: 0, exp: '在最後一輪有下注動作的情況下，由最後一個下注或加註（Aggressor）的玩家優先亮牌。' },
                { cat: '下注規則', q: '{pos}分兩次將籌碼放入底池（未事先口頭宣告加註），這是什麼行為？', opts: ['合法加註', '分次下注 (String Bet)，違規，只能視為跟注', '直接判決死牌', '視為全押'], ans: 1, exp: '分次下注 (String Bet) 若未事先宣告金額，必須一次性推入籌碼。分次推入只能被視為跟注。' },
                { cat: '發牌與規則', q: '荷官在翻牌圈忘記銷牌 (Burn card)，直接發出三張公共牌，且尚未有玩家行動。應如何處理？', opts: ['保留該三張牌不處理', '收回三張翻牌，重新洗牌後，正確銷一張牌再發出', '將第三張當銷牌，補發一張', '直接進入下一輪'], ans: 1, exp: '忘記銷牌且無人行動時，必須將錯誤的公共牌收回與剩餘牌堆洗勻，重新銷牌並發出正確的牌。' },
                { cat: '流程規則', q: '{pos}在未輪到他時提早行動 (Action out of turn) 宣佈跟注。若輪到他時，前方玩家有人加註，他的提早行動有效嗎？', opts: ['依然有效，必須跟注加註額', '無效，他可以重新決定要跟注、加註或棄牌', '有效，但他不能再加註', '視為死牌'], ans: 1, exp: '如果前方玩家的行動發生改變（如加註），提早行動的玩家可以收回之前的決定，重新選擇所有合法動作。' },
                { cat: '盲注規則', q: '如果小盲注玩家在上一局被淘汰，這一局的按鈕 (Button) 該怎麼擺？', opts: ['按鈕移動到大盲注位置', '按鈕移動到空位上（Dead Button），該局無小盲注', '按鈕不移動', '重新抽籤決定按鈕'], ans: 1, exp: '實施「死按鈕 (Dead Button)」規則。按鈕會移動到被淘汰玩家的空位上，確保大盲注位置正確推進。' },
                { cat: '宣告與動作', q: '{pos}口頭宣告「加註 ${amt}」，但實際上丟出兩倍面額的籌碼且未要求找零。應視為多少？', opts: ['加註兩倍金額', '加註 ${amt}，荷官應找零', '無效動作', '跟注'], ans: 1, exp: '口頭宣告優先（Verbal Declaration is Binding）。只要口頭宣告了金額，無論丟出多少籌碼，都視為該宣告金額。' },
                { cat: '下注規則', q: '{pos}在 All-in 時，籌碼量「未達」最小合法加註額 (Short All-in)。前方已經行動過的玩家還能再加註嗎？', opts: ['可以，只要籌碼夠', '不行，無法重新開啟加註權限 (Re-open betting)，只能跟注', '由荷官決定', '可以，但只能加倍'], ans: 1, exp: '不足最小加註額的 All-in (Short All-in) 不會重新開啟已經行動過玩家的加註權限。' },
                { cat: '發牌與規則', q: '{pos}為了看清楚遠處的公共牌，將自己的底牌拿離桌面。這樣可以嗎？', opts: ['可以，只要不給別人看', '違規。底牌必須隨時保持在桌面範圍及荷官視線內', '只有在單挑時可以', '由對手決定'], ans: 1, exp: '撲克安全規則要求玩家的底牌必須隨時保持在桌面邊界之內，並且在荷官視線內防作弊。' },
                { cat: '發牌與規則', q: '荷官在發轉牌 (Turn) 時，不小心黏牌發出了兩張牌。該怎麼處理？', opts: ['兩張都作廢', '保留正確的第一張，第二張視為下一輪河牌的銷牌', '重新洗牌', '讓玩家投票決定'], ans: 1, exp: '正確的那張轉牌保留。多出的那一張提早作為河牌圈的銷牌（放在一旁，河牌時不再銷牌）。' },
                { cat: '發牌與規則', q: '荷官在前方玩家「尚未完成行動前」，就提早發出了下一輪的公共牌 (Premature Deal)。', opts: ['該公共牌無效，將牌收回洗入牌堆，等待行動完後重新發出', '保留該牌強制決定', '給未行動玩家補償籌碼', '該局直接平分'], ans: 0, exp: '提早發出的公共牌一律無效。必須收回與剩餘牌堆洗勻，待所有行動完成後重新發出。' },
                { cat: '盲注規則', q: '{pos}在盲注位，但發牌時他不在座位上。荷官該怎麼做？', opts: ['不發牌給他', '發牌給他，若輪到他行動時他還沒回來，則視為死牌並扣除盲注', '幫他下盲注並過牌', '等他回來'], ans: 1, exp: '不在座位上的玩家依然會被發牌與扣除盲注。若輪到他行動時仍未回座，手牌直接視為死牌。' },
                { cat: '判定規則', q: '公共牌為 A-A-K-K-Q。玩家A底牌為 J-J，玩家B底牌為 10-10。誰贏得底池？', opts: ['平分底池 (Split Pot)', '玩家A贏', '玩家B贏', '由花色決定'], ans: 0, exp: '兩人的最大五張牌組合都是 A-A-K-K-Q（打公共牌）。底牌的 J 或 10 都無法替換掉公共牌的 Q，因此平分。' },
                { cat: '流程規則', q: '洗牌後，荷官忘記讓玩家切牌 (Cut card) 就直接開始發牌。', opts: ['發出第一張牌就誤發', '若已經發出兩張以上的牌，通常視為誤發，必須重新洗牌', '整局打完才算', '繼續打'], ans: 1, exp: '忘記切牌屬於程序錯誤，若已開始發牌（大於兩張），為確保公平性，應宣告誤發並重新洗牌。' },
                { cat: '籌碼規則', q: '{pos}將籌碼向前推出越過下注線 (Forward motion)，隨後反悔想收回。', opts: ['允許收回', '越過下注線的籌碼必須全部留在池中', '警告一次，允許收回', '判決死牌'], ans: 1, exp: '向前推進規則 (Forward Motion) 規定，籌碼被推進並越過下注線，就必須留在底池，不允許反悔。' },
                { cat: '發牌與規則', q: '發出河牌後，發現牌堆裡少了一張牌（整副牌只有51張），這局怎麼算？', opts: ['整局作廢退還籌碼', '只要參與手牌的玩家拿到完整牌且公共牌發完，該局依然有效', '沒收底池', '重發河牌'], ans: 1, exp: '若在牌局末期發現缺牌，只要不影響已發出的玩家底牌和公共牌，該局依然有效並正常結算。' },
                { cat: '宣告與動作', q: '{pos}下注後，下一位玩家丟出一枚超大面額籌碼並喊「加註」，但沒說金額。', opts: ['加註到最小額度', '加註總額視為該枚籌碼的完整面額', '由玩家重新決定', '無效動作'], ans: 1, exp: '若宣告加註，且丟出單一枚超大面額籌碼而沒有宣告特定金額，則加註總額視為該枚籌碼的完整面額。' },
                { cat: '桌面禮儀', q: '{pos}在手牌結束後，要求荷官翻開剩餘未發出的牌來看（兔子狩獵 Rabbit Hunting）。可以嗎？', opts: ['可以，只要大家同意', '絕對不允許 (No Rabbit Hunting)', '只有贏家可以看', '付費可以看'], ans: 1, exp: 'TDA 規則嚴格禁止兔子狩獵 (Rabbit Hunting)，以維持遊戲進度與公平性。' },
                { cat: '攤牌規則', q: '{pos}在局間將底牌私下亮給旁邊已經蓋牌的玩家看。', opts: ['合法', '違反「亮牌公平性 (Show One, Show All)」，必須將牌亮給全桌看', '直接判決死牌', '警告旁觀者'], ans: 1, exp: '根據 Show One, Show All 規則，若將牌展示給任何一位玩家，全桌都有權利看見該手牌。' },
                { cat: '流程規則', q: '{pos}思考時間過長，其他玩家「呼叫時間 (Call the clock)」。接下來會發生什麼事？', opts: ['直接強制蓋牌', '賽事總監會給予一段倒數時間(通常30秒)，若時間到仍未行動則手牌視為死牌', '罰款籌碼', '暫停遊戲'], ans: 1, exp: '呼叫時間後，樓管(Floorman)會給予倒數計時。時間結束未完成動作，手牌自動視為死牌。' },
                { cat: '桌面禮儀', q: '牌局進行中，{pos}與另一位玩家用非英語（如家鄉話）交談手牌內容。', opts: ['只要不是討論目前手牌就可以', '違反「僅限英語 (English Only)」規則，牌局進行中桌面僅能使用官方語言', '只有單挑時可以', '由荷官決定'], ans: 1, exp: '為了防止作弊與合謀，國際賽事在牌局進行中嚴格執行 English Only 規則。' },
                { cat: '攤牌規則', q: '{pos}在攤牌時，宣稱自己有同花，但只亮出其中一張黑桃，另一張蓋著。他能贏得底池嗎？', opts: ['可以，大家相信他', '不行，必須將兩張底牌都亮出桌面 (Show all hole cards) 才能贏得底池', '由對手決定是否要看另一張', '荷官幫他翻開'], ans: 1, exp: '要贏得底池，玩家在攤牌時必須主動亮出所有底牌，不能只亮一張。' },
                { cat: '判定規則', q: '{pos}決定棄牌，將牌往前推，但牌不小心碰到了另一位仍在局內玩家的底牌。', opts: ['碰到活牌，所以該棄牌復活', '碰到死牌的活牌也會變成死牌', '棄牌依然是死牌，活牌只要能清楚辨識依然有效', '兩者皆重新發牌'], ans: 2, exp: '死牌碰到活牌時，只要活牌能清楚辨識且未混合，活牌依然有效，棄牌維持死牌狀態。' },
                { cat: '流程規則', q: '翻牌後，大家發現按鈕 (Button) 放錯了位置，但已經有玩家採取了下注行動。', opts: ['退回重打', '只要有顯著行動 (Substantial Action) 發生，該局繼續以錯誤按鈕打完', '移動按鈕並繼續', '沒收底池'], ans: 1, exp: '一旦發生顯著行動（如兩人行動或一人下注），該局就必須以現狀繼續完成，下一局再修正。' },
                { cat: '籌碼規則', q: '{pos}詢問荷官目前底池裡面有多少籌碼 (在無限注德州撲克 No-Limit 中)。', opts: ['荷官必須精算並報數', '荷官不能計算底池總額，只能攤平底池讓玩家自己看', '荷官可以隨便估算', '其他玩家幫忙算'], ans: 1, exp: '在無限注德州撲克中，荷官不允許替玩家計算底池總數（Pot Limit 則可以）。只能將籌碼攤平方便觀看。' },
                { cat: '下注規則', q: '還沒發牌前，{pos}就宣布「這局我 All-in (盲推)」。這有效嗎？', opts: ['無效，等發牌後重新決定', '有效，這被視為黑暗宣告 (Action in the dark)，必須強制執行', '視為死牌', '荷官警告'], ans: 1, exp: '黑暗行動 (Action in the dark) 具有約束力，只要宣告就必須執行。' },
                { cat: '籌碼規則', q: '{pos}把籌碼用力丟向底池中央，使得籌碼散落混入原本的底池中 (Splashing the pot)。', opts: ['合法，有氣勢', '違規行為，這會導致難以計算下注額，應被警告', '判決死牌', '沒收該籌碼'], ans: 1, exp: '潑灑底池 (Splashing the pot) 嚴重影響遊戲進行與籌碼計算，屬於違反禮儀的行為。' },
                { cat: '宣告與動作', q: '輪到{pos}行動，他口頭說「跟注」，但隨後把手牌蓋掉 (Fold)。以哪個為準？', opts: ['以口頭「跟注」為準，必須補足籌碼但手牌已死', '以蓋牌為準，不需補籌碼', '視為加註', '退回重來'], ans: 0, exp: '口頭宣告具約束力。他必須補齊跟注的籌碼，但因為已經蓋牌，所以這手牌無法參與後續。' },
                { cat: '流程規則', q: '發牌時，荷官不小心將牌發給了已經空著的座位，且已經發了兩張。', opts: ['當作沒看到', '該座位的牌視為死牌，並作為下一次的銷牌', '宣告誤發 (Misdeal) 重新洗牌', '給下一位玩家'], ans: 2, exp: '發牌給錯誤的位置或空位，影響了後續所有玩家拿牌的順序，應宣告誤發重洗。' },
                { cat: '盲注規則', q: '什麼是「抓牌位 (Straddle)」下注？', opts: ['大盲後一位玩家在發牌前盲下兩倍大盲的注', '按鈕位盲下注', '翻牌後的強制下注', '任何人隨意下注'], ans: 0, exp: 'Straddle 通常是大盲左手邊玩家(UTG)在發牌前的盲注加註，讓他能在翻牌前最後一個行動。' },
                { cat: '籌碼規則', q: '{pos}的大面額籌碼放在籌碼柱的後方被擋住 (Dirty stack/Hidden chips)。', opts: ['合法', '違規，大面額籌碼必須放在最前方或最上方清楚可見處', '沒收籌碼', '只能拿來跟注'], ans: 1, exp: '大面額籌碼必須隨時讓全桌玩家及荷官清楚可見，隱藏大籌碼是違規行為。' }
            ];

            const variations = ['槍口位(UTG)', '中間位置(MP)', '關門位(Cutoff)', '按鈕位(Button)', '小盲位(SB)'];
            
            // 生成 170 題實體規則題 (34 種情境 x 5 種變體 = 170 題)
            baseRuleTemplates.forEach((tpl, i) => {
                for(let v = 0; v < 5; v++) {
                    qList.push({
                        templateId: `rule_${i}`, // 用於去重的核心 ID
                        id: idCounter++,
                        category: tpl.cat,
                        question: tpl.q.replace(/\{pos\}/g, variations[v]).replace(/\{amt\}/g, (v + 2) * 100),
                        options: [...tpl.opts].sort(() => Math.random() - 0.5), // 打亂選項
                        correctAnswerText: tpl.opts[tpl.ans], // 綁定正確答案文字
                        explanation: tpl.exp
                    });
                }
            });

            // 2. 最小加註計算 (Min Raise) - 10 題
            const blindsList = [{ sb: 10, bb: 20 }, { sb: 25, bb: 50 }, { sb: 50, bb: 100 }];
            for (let i = 0; i < 10; i++) {
                const blinds = blindsList[i % blindsList.length];
                const bet = blinds.bb * (Math.floor(Math.random() * 3) + 2); 
                const raiseAmount = blinds.bb * (Math.floor(Math.random() * 4) + 2);
                const raiseTotal = bet + raiseAmount;
                const minReraise = raiseTotal + raiseAmount;

                const correctAns = `$${minReraise}`;
                const options = [correctAns, `$${raiseTotal + bet}`, `$${raiseTotal * 2}`, `$${minReraise + blinds.bb}`];
                
                qList.push({
                    templateId: `math_minraise_${i}`,
                    id: idCounter++,
                    category: '最小加註計算',
                    question: `盲注級別 $${blinds.sb}/$${blinds.bb}。翻牌後，玩家A下注 $${bet}，玩家B加註到總額 $${raiseTotal}。請問如果玩家C想要再加註（Re-raise），最低的加註總額應該是多少？`,
                    options: options.sort(() => Math.random() - 0.5),
                    correctAnswerText: correctAns,
                    explanation: `B的實際加註額為 $${raiseAmount} ($${raiseTotal} - $${bet})。下一位的最小加註總額 = 目前總注額 + 前次加註額 = $${raiseTotal} + $${raiseAmount} = $${minReraise}。`
                });
            }

            // 3. 邊池計算 (Side Pot) - 10 題
            for (let i = 0; i < 10; i++) {
                const A = (Math.floor(Math.random() * 5) + 1) * 200; 
                const diff = (Math.floor(Math.random() * 5) + 1) * 200;
                const B = A + diff;
                const mainPot = A * 3;
                const sidePot = diff * 2;

                const correctAns = `主池: $${mainPot}, 邊池: $${sidePot}`;
                const options = [correctAns, `主池: $${A * 2}, 邊池: $${B * 2}`, `主池: $${mainPot + sidePot}, 邊池: $0`, `主池: $${mainPot}, 邊池: $${diff * 3}`];

                qList.push({
                    templateId: `math_sidepot_${i}`,
                    id: idCounter++,
                    category: '邊池計算',
                    question: `三人局。玩家A籌碼 $${A} 全押 (All-in)，玩家B籌碼 $${B} 也全押，玩家C籌碼最多並宣告跟注。請問主池與邊池分別是多少？`,
                    options: options.sort(() => Math.random() - 0.5),
                    correctAnswerText: correctAns,
                    explanation: `主池由3人承擔最小 All-in (A) 的金額：$${A} x 3 = $${mainPot}。邊池由B與C承擔B多出來的金額($${diff})：$${diff} x 2 = $${sidePot}。`
                });
            }

            // 4. 單一籌碼規則 (One-Chip Rule) - 10 題
            const chipValues = [1000, 5000, 25000];
            for (let i = 0; i < 10; i++) {
                const chip = chipValues[i % chipValues.length];
                const bet = (Math.floor(Math.random() * 4) + 1) * (chip / 10);
                
                const correctAns = '跟注 (Call)';
                const options = [correctAns, '加註 (Raise)', '無效動作', '視為棄牌 (Fold)'];

                qList.push({
                    templateId: `math_onechip_${i}`,
                    id: idCounter++,
                    category: '單一籌碼規則',
                    question: `面對前方玩家 $${bet} 的下注，某玩家默默丟出一枚面額 $${chip} 的大籌碼，且「沒有」任何口頭宣告。身為荷官，這代表什麼動作？`,
                    options: options.sort(() => Math.random() - 0.5),
                    correctAnswerText: correctAns,
                    explanation: `根據TDA「單一籌碼規則」，丟出一枚面額大於下注額的單一籌碼且未宣告加註，一律視為「跟注 (Call)」，需找零 $${chip - bet}。`
                });
            }

            return qList; // 總計 170 + 10 + 10 + 10 = 200 題
        };

        // ==========================================
        // 系統狀態與邏輯
        // ==========================================
        const ALL_QUESTIONS = generateQuestionBank();
        const QUESTIONS_PER_SESSION = 30;

        let state = {
            gameState: 'start', // 'start', 'quiz', 'result'
            sessionQuestions: [],
            currentIndex: 0,
            score: 0,
            selectedOption: null,
            isSubmitted: false,
            history: []
        };

        // 陣列洗牌工具
        const shuffleArray = (array) => [...array].sort(() => 0.5 - Math.random());

        // 更新畫面
        function render() {
            const app = document.getElementById('app');
            if (state.gameState === 'start') {
                app.innerHTML = renderStartScreen();
            } else if (state.gameState === 'quiz') {
                app.innerHTML = renderQuizScreen();
            } else if (state.gameState === 'result') {
                app.innerHTML = renderResultScreen();
            }
            lucide.createIcons();
        }

        // ==========================================
        // 核心抽題演算法 (保證 30 題完全不同類型)
        // ==========================================
        window.startPractice = () => {
            // 1. 分離不同題型
            const rules = ALL_QUESTIONS.filter(q => q.templateId.startsWith('rule_'));
            const minRaises = ALL_QUESTIONS.filter(q => q.templateId.startsWith('math_minraise_'));
            const sidePots = ALL_QUESTIONS.filter(q => q.templateId.startsWith('math_sidepot_'));
            const oneChips = ALL_QUESTIONS.filter(q => q.templateId.startsWith('math_onechip_'));

            let selectedSessionQuestions = [];

            // 2. 抽取 24 題實體規則題 (強制過濾 templateId，確保不重複)
            let ruleGroups = {};
            rules.forEach(q => {
                if (!ruleGroups[q.templateId]) ruleGroups[q.templateId] = [];
                ruleGroups[q.templateId].push(q);
            });
            
            // 將 34 個 template 打亂，選出 24 個不同的情境
            const shuffledRuleKeys = shuffleArray(Object.keys(ruleGroups)).slice(0, 24);
            
            // 從這 24 個情境中，各隨機挑選 1 個變體
            shuffledRuleKeys.forEach(key => {
                const variants = ruleGroups[key];
                const randomVariant = variants[Math.floor(Math.random() * variants.length)];
                selectedSessionQuestions.push(randomVariant);
            });

            // 3. 抽取計算題 (各 2 題)
            selectedSessionQuestions.push(...shuffleArray(minRaises).slice(0, 2));
            selectedSessionQuestions.push(...shuffleArray(sidePots).slice(0, 2));
            selectedSessionQuestions.push(...shuffleArray(oneChips).slice(0, 2));

            // 4. 最後將這完美的 30 題大洗牌
            state.sessionQuestions = shuffleArray(selectedSessionQuestions);
            
            state.gameState = 'quiz';
            state.currentIndex = 0;
            state.score = 0;
            state.history = [];
            state.selectedOption = null;
            state.isSubmitted = false;
            render();
        };

        window.setSelectedOption = (idx) => {
            if (state.isSubmitted) return;
            state.selectedOption = idx;
            render();
        };

        window.handleSubmit = () => {
            if (state.selectedOption === null) return;
            
            const currentQ = state.sessionQuestions[state.currentIndex];
            const selectedText = currentQ.options[state.selectedOption];
            const isCorrect = selectedText === currentQ.correctAnswerText;
            
            if (isCorrect) state.score += 1;
            
            state.history.push({
                question: currentQ.question,
                category: currentQ.category,
                userAnswer: selectedText,
                correctAnswer: currentQ.correctAnswerText,
                explanation: currentQ.explanation,
                isCorrect: isCorrect
            });
            
            state.isSubmitted = true;
            render();
        };

        window.handleNext = () => {
            if (state.currentIndex < QUESTIONS_PER_SESSION - 1) {
                state.currentIndex += 1;
                state.selectedOption = null;
                state.isSubmitted = false;
            } else {
                state.gameState = 'result';
            }
            render();
        };

        // ==========================================
        // 畫面渲染函數
        // ==========================================
        function renderStartScreen() {
            return `
                <div class="flex flex-col items-center justify-center min-h-[600px] text-center space-y-8 animate-fade-in">
                    <div class="bg-emerald-900/30 p-6 rounded-full border-[3px] border-emerald-500 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                        <i data-lucide="award" class="text-yellow-400 w-16 h-16"></i>
                    </div>
                    <div class="space-y-6 max-w-2xl">
                        <h1 class="text-[2.5rem] font-bold text-emerald-400 tracking-wide drop-shadow-md">德州實體荷官(Dealer)專業認證</h1>
                        <p class="text-slate-300 text-lg leading-relaxed px-4">
                            本系統內建精確 200 題國際標準(TDA)題庫。其中包含 170 題實體規則與 30 題數理計算。<br/><br/>
                            每次嚴格配比抽出<span class="font-bold text-yellow-400 text-2xl mx-1">${QUESTIONS_PER_SESSION}</span>題完全不同情境的題目進行測驗。準備好挑戰您的荷官專業度了嗎？
                        </p>
                    </div>
                    <div class="pt-6">
                        <button 
                            onclick="startPractice()"
                            class="flex items-center gap-3 bg-[#0f9d58] hover:bg-emerald-600 text-white px-10 py-4 rounded-full text-xl font-bold transition-all transform hover:scale-[1.02] shadow-[0_4px_14px_0_rgba(16,185,129,0.39)]"
                        >
                            <i data-lucide="play" class="fill-current w-6 h-6"></i>
                            開始專業測試
                        </button>
                    </div>
                </div>
            `;
        }

        function renderQuizScreen() {
            const q = state.sessionQuestions[state.currentIndex];
            
            const optionsHtml = q.options.map((opt, idx) => {
                let btnStyle = "bg-[#1e293b] border-slate-700 hover:bg-slate-700 hover:border-slate-500 text-slate-200 cursor-pointer shadow-sm";
                let iconHtml = "";
                
                if (state.isSubmitted) {
                    btnStyle = "bg-[#1e293b] border-slate-700 text-slate-500 opacity-60 cursor-default";
                    const isThisOptCorrect = (opt === q.correctAnswerText);
                    
                    if (isThisOptCorrect) {
                        btnStyle = "bg-emerald-900/30 border-emerald-500/50 text-emerald-300 cursor-default"; 
                        iconHtml = `<i data-lucide="check-circle-2" class="text-emerald-500"></i>`;
                    } else if (idx === state.selectedOption) {
                        btnStyle = "bg-red-900/30 border-red-500/50 text-red-300 cursor-default"; 
                        iconHtml = `<i data-lucide="x-circle" class="text-red-500"></i>`;
                    }
                } else if (state.selectedOption === idx) {
                    btnStyle = "bg-[#1e293b] border-emerald-500 text-emerald-300 shadow-[0_0_10px_rgba(16,185,129,0.2)]"; 
                }

                return `
                    <button
                        ${state.isSubmitted ? 'disabled' : ''}
                        onclick="setSelectedOption(${idx})"
                        class="w-full text-left p-4 rounded-xl border transition-all duration-200 flex items-center justify-between ${btnStyle}"
                    >
                        <span class="text-lg">${opt}</span>
                        ${iconHtml}
                    </button>
                `;
            }).join('');

            let feedbackHtml = '';
            if (!state.isSubmitted) {
                const btnClass = state.selectedOption !== null 
                    ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg cursor-pointer' 
                    : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed';
                
                feedbackHtml = `
                    <button
                        onclick="handleSubmit()"
                        ${state.selectedOption === null ? 'disabled' : ''}
                        class="w-full py-4 rounded-xl text-xl font-bold transition-all ${btnClass}"
                    >
                        確認送出
                    </button>
                `;
            } else {
                const selectedText = q.options[state.selectedOption];
                const isCorrect = selectedText === q.correctAnswerText;
                const alertStyle = isCorrect ? 'bg-emerald-900/20 border-emerald-500/50' : 'bg-red-900/20 border-red-500/50';
                const titleColor = isCorrect ? 'text-emerald-400' : 'text-red-400';
                const titleText = isCorrect ? '正確！' : '錯誤！';
                const iconHtml = isCorrect 
                    ? `<i data-lucide="check-circle-2" class="text-emerald-400"></i>` 
                    : `<i data-lucide="alert-triangle" class="text-red-400"></i>`;
                const btnText = state.currentIndex < QUESTIONS_PER_SESSION - 1 ? '下一題' : '查看結算成績';

                feedbackHtml = `
                    <div class="space-y-4 animate-fade-in">
                        <div class="p-5 rounded-xl border ${alertStyle}">
                            <div class="flex items-center gap-2 mb-2">
                                ${iconHtml}
                                <h3 class="font-bold text-lg ${titleColor}">${titleText}</h3>
                            </div>
                            <p class="text-slate-300 leading-relaxed">${q.explanation}</p>
                        </div>
                        <button
                            onclick="handleNext()"
                            class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl text-xl font-bold transition-all shadow-lg"
                        >
                            ${btnText}
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                `;
            }

            return `
                <div class="max-w-3xl mx-auto w-full flex flex-col space-y-6 animate-fade-in">
                    <!-- Progress Header -->
                    <div class="flex justify-between items-center bg-[#1e293b] p-4 rounded-xl border border-slate-700 shadow-sm">
                        <div class="space-y-1">
                            <span class="text-sm text-slate-400 font-semibold uppercase tracking-wider">進度</span>
                            <div class="text-xl font-bold text-emerald-400">
                                題目 ${state.currentIndex + 1} <span class="text-slate-500">/ ${QUESTIONS_PER_SESSION}</span>
                            </div>
                        </div>
                        <div class="space-y-1 text-right">
                            <span class="text-sm text-slate-400 font-semibold uppercase tracking-wider">得分</span>
                            <div class="text-xl font-bold text-yellow-400">${state.score}</div>
                        </div>
                    </div>

                    <!-- Question Card -->
                    <div class="bg-transparent space-y-6">
                        <span class="inline-block px-3 py-1 bg-emerald-900/30 text-emerald-400 text-sm font-bold rounded-lg border border-emerald-800/50">
                            ${q.category}
                        </span>
                        <h2 class="text-[1.35rem] font-medium text-slate-100 leading-relaxed tracking-wide">
                            ${q.question}
                        </h2>

                        <div class="space-y-4 pt-4">
                            ${optionsHtml}
                        </div>
                    </div>

                    <!-- Feedback & Actions -->
                    <div class="min-h-[120px] pt-4">
                        ${feedbackHtml}
                    </div>
                </div>
            `;
        }

        function renderResultScreen() {
            const percentage = Math.round((state.score / QUESTIONS_PER_SESSION) * 100);
            let feedbackMsg = "";
            let feedbackColor = "";
            
            if (percentage >= 90) { feedbackMsg = "卓越！具備國際賽事級別專業荷官水準！"; feedbackColor = "text-yellow-400"; }
            else if (percentage >= 75) { feedbackMsg = "優秀！對規則有很好的掌握，稍加練習即可上桌。"; feedbackColor = "text-emerald-400"; }
            else if (percentage >= 60) { feedbackMsg = "及格！基本概念有，但在計算與特殊規則上需多加複習。"; feedbackColor = "text-orange-400"; }
            else { feedbackMsg = "需加強！建議重新熟讀 TDA 規則及底池計算方式。"; feedbackColor = "text-red-400"; }

            const wrongAnswers = state.history.filter(h => !h.isCorrect);
            let wrongAnswersHtml = '';

            if (wrongAnswers.length > 0) {
                const listHtml = wrongAnswers.map(item => `
                    <div class="bg-[#1e293b] border border-red-900/50 p-6 rounded-xl space-y-3">
                        <span class="text-xs font-bold text-red-400 uppercase tracking-wider bg-red-900/30 px-2 py-1 rounded">${item.category}</span>
                        <p class="text-lg text-slate-200 font-medium">${item.question}</p>
                        <div class="bg-slate-900/50 p-4 rounded-lg space-y-2 text-sm">
                            <div class="flex items-start gap-2">
                                <i data-lucide="x-circle" class="text-red-500 shrink-0 mt-0.5 w-5 h-5"></i>
                                <span class="text-slate-400">你的答案：<span class="text-red-300 line-through">${item.userAnswer}</span></span>
                            </div>
                            <div class="flex items-start gap-2">
                                <i data-lucide="check-circle-2" class="text-emerald-500 shrink-0 mt-0.5 w-5 h-5"></i>
                                <span class="text-slate-400">正確答案：<span class="text-emerald-400 font-bold">${item.correctAnswer}</span></span>
                            </div>
                        </div>
                        <div class="text-slate-300 text-sm bg-[#0f172a] p-4 rounded-lg border-l-4 border-emerald-500">
                            <span class="font-bold text-emerald-400 block mb-1">解析說明：</span>
                            ${item.explanation}
                        </div>
                    </div>
                `).join('');

                wrongAnswersHtml = `
                    <div class="space-y-4 pt-8">
                        <h3 class="text-2xl font-bold text-slate-200 border-b border-slate-700 pb-2">錯誤題目檢討</h3>
                        ${listHtml}
                    </div>
                `;
            }

            return `
                <div class="max-w-4xl mx-auto w-full space-y-8 animate-fade-in">
                    <div class="bg-[#1e293b] border border-slate-700 p-8 rounded-2xl shadow-xl text-center space-y-6">
                        <h2 class="text-3xl font-bold text-slate-200">測驗結算報告</h2>
                        
                        <div class="flex justify-center py-6">
                            <div class="relative w-48 h-48 rounded-full border-8 border-slate-700 flex flex-col items-center justify-center bg-[#0f172a] shadow-inner">
                                <span class="text-5xl font-black ${feedbackColor}">${percentage}%</span>
                                <span class="text-slate-400 mt-2 font-semibold">${state.score} / ${QUESTIONS_PER_SESSION} 答對</span>
                            </div>
                        </div>
                        
                        <p class="text-xl font-bold ${feedbackColor}">${feedbackMsg}</p>
                        
                        <div class="pt-4">
                            <button
                                onclick="startPractice()"
                                class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg mx-auto"
                            >
                                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                                重新挑戰 (隨機新題)
                            </button>
                        </div>
                    </div>

                    ${wrongAnswersHtml}
                </div>
            `;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
